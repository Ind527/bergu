<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZHIYANG HERBAL</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#fff;
    max-width:700px;
    margin:auto;
}

.full-img{
    width:100%;
    display:block;
}

.slider{
    width:100%;
    overflow:hidden;
}

.slider img{
    width:100%;
    display:block;
    transition:opacity .5s ease;
}

.content{
    padding:35px 20px;
    text-align:center;
}

.content h1{
    color:#d60000;
    font-size:34px;
    margin-bottom:20px;
    font-weight:bold;
}

.content h2{
    font-size:30px;
    margin-bottom:15px;
}

.old{
    text-decoration:line-through;
    color:#777;
    font-size:26px;
    margin-bottom:10px;
}

.promo{
    color:#d60000;
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
}

.solusi{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.line{
    height:2px;
    background:#ddd;
    margin:20px 0;
}

.desc{
    font-size:22px;
    line-height:1.7;
}

.form{
    padding:20px;
}

/* Styling tambahan untuk widget Mengantar */
#app{
    background-color:transparent !important;
    text-align:left;
}

.embed-sealHide,
.embed-leftHide,
.bottom-bar-text{
    display:none !important;
}

.embed-rightHide{
    flex:0 0 100% !important;
    width:100% !important;
    max-width:100% !important;
    margin:auto;
}

.embed-bgHide{
    box-shadow:none !important;
    background:transparent !important;
    border:none !important;
    padding:1px 20px !important;
    margin:0;
}

.embed-topSpace{
    margin:auto !important;
}

.embed-wrapper{
    height:auto !important;
    overflow:initial !important;
}
</style>
</head>

<body>

<!-- Gambar 1 -->
<img src="gambar1.webp" class="full-img" alt="">

<!-- Gambar 2 -->
<img src="gambar2.webp" class="full-img" alt="">

<!-- Slider gambar 3,4,5,6 -->
<div class="slider">
    <img id="slide" src="gambar3.webp" alt="">
</div>

<!-- Teks promo -->
<div class="content">

<h1>PROMO KHUSUS HARI INI</h1>

<h2>ZHIYANG - 止痒 HERBAL</h2>

<div class="old">
278 Ribu
</div>

<div class="promo">
HARGA PROMO 139 Ribu
</div>

<div class="solusi">
"SOLUSI TEPAT ATASI MASALAH KULIT"
</div>

<div class="line"></div>

<div class="desc">
Untuk Mendapatkan <b>HARGA PROMO & GRATIS ONGKIR</b><br><br>
Segera Klik Tombol Dibawah Ini
</div>

</div>

<!-- Gambar 8 -->
<img src="gambar8.webp" class="full-img" alt="">

<!-- Form Mengantar -->
<div class="form">

<link href="https://zhiyangg.form.id/css/app.css" rel="stylesheet"/>

<mengantar-form-widget
    id="mengantar-form-widget"
    url="-https---zhiyangg-form-id-"
    domain="zhiyangg.form.id"
    embed="true"
    settings='{
        "type":"page",
        "popupButtonText":"Klik untuk pemesanan",
        "popupText":"Form Pemesanan",
        "popupButtonColor":"#2e47ba",
        "redirectTo":"https://zhiyangg.form.id",
        "isFbPixel":"true",
        "isHideBackground":"true",
        "isNoMargin":"false",
        "isGtm":"true"
    }'>
</mengantar-form-widget>

<script src="https://zhiyangg.form.id/app.js"></script>

</div>

<!-- Gambar 9 -->
<img src="gambar9.webp" class="full-img" alt="">

<!-- Gambar 10 -->
<img src="gambar10.webp" class="full-img" alt="">

<script>
// daftar gambar untuk slider
const slides = [
    "gambar3.webp",
    "gambar4.webp",
    "gambar5.webp",
    "gambar6.webp"
];

let index = 0;
const img = document.getElementById("slide");

// auto slide setiap 2 detik
setInterval(function(){

    img.style.opacity = 0;

    setTimeout(function(){

        index++;

        if(index >= slides.length){
            index = 0;
        }

        img.src = slides[index];
        img.style.opacity = 1;

    },300);

},2000);
</script>

</body>
</html>
